      <stop offset="0" stop-color="#22262e"/>
      <stop offset="1" stop-color="#15171c"/>
    </linearGradient>
    <linearGradient id="mint" x1="34" y1="30" x2="94" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7ef0c8"/>
      <stop offset="1" stop-color="#39c79a"/>
