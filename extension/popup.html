<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        width: 320px;
        margin: 0;
        padding: 12px;
        color: #1a1a1a;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
      }
      button {
        font: inherit;
        padding: 6px 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: #f7f7f7;
        cursor: pointer;
      }
      button.primary {
        background: #2b7cff;
        color: #fff;
        border-color: #2b7cff;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
      }
      #list {
        list-style: none;
        margin: 8px 0;
        padding: 0;
        max-height: 220px;
        overflow: auto;
      }
      #list li {
        border: 1px solid #eee;
        border-radius: 6px;
        padding: 6px 8px;
        margin-bottom: 6px;
        font-size: 12px;
      }
      #list .sel {
        color: #666;
        font-family: ui-monospace, monospace;
        word-break: break-all;
      }
      #list .rm {
        float: right;
        color: #c00;
        cursor: pointer;
      }
      #status {
        font-size: 12px;
        color: #666;
        min-height: 16px;
      }
      a {
        font-size: 11px;
        color: #2b7cff;
      }
    </style>
  </head>
  <body>
    <h1>OpenCode Browser Annotation</h1>
    <div class="row">
      <button id="pick" class="primary">Select element</button>
      <button id="clear">Clear</button>
    </div>
    <ul id="list"></ul>
    <div class="row">
      <button id="submit" class="primary">Submit to agent</button>
    </div>
    <div id="status"></div>
    <a href="#" id="opts">Settings</a>
    <script src="popup.js"></script>
  </body>
</html>
