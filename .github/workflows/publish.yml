name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC provenance)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run build
      # Trusted publishing: no NODE_AUTH_TOKEN. This repo + workflow is configured
      # as a trusted publisher for the package on npmjs.com. Trusted publishing
      # needs npm >= 11.5.1; upgrade within the Node 24 engine range.
      - run: npm install -g npm@11
      - run: npm publish --provenance --access public
